services:
  db:
    image: postgres:16
    container_name: tresvance_pg
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  odoo:
    image: odoo:19
    container_name: tresvance_odoo19
    depends_on:
      - db
    ports:
      - "4011:8069"   # changed
    volumes:
      - ./custom_addons:/mnt/extra-addons
      - ./config:/etc/odoo
      - ./logs:/var/log/odoo
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo